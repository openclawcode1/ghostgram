name: Build GhostGram iOS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Create build configuration
        run: |
          cat > build-config.json << 'EOF'
          {
              "bundle_id": "com.lighting5048.pink1317",
              "api_id": "33128122",
              "api_hash": "319461e0059569e85c41a2fc46507f86",
              "team_id": "R72FY6PWXS",
              "is_internal_build": "true",
              "is_appstore_build": "false",
              "app_specific_url_scheme": "tg"
          }
          EOF

      - name: Setup Bazel
        run: |
          mkdir -p build-input
          curl -L -o build-input/bazel-8.4.2-darwin-arm64 \
            https://github.com/bazelbuild/bazel/releases/download/8.4.2/bazel-8.4.2-darwin-arm64
          chmod +x build-input/bazel-8.4.2-darwin-arm64
          ./build-input/bazel-8.4.2-darwin-arm64 --version

      - name: Build with Make.py
        run: |
          SOURCE_DIR=$GITHUB_WORKSPACE
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_github"
          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          COMMIT_COUNT=$(git rev-list --count HEAD)
          BUILD_NUMBER="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"

          python3 build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            --bazel=./build-input/bazel-8.4.2-darwin-arm64 \
            build \
            --configurationPath="build-config.json" \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER" \
            --disableProvisioningProfiles

      - name: Collect IPA
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p dist
          find bazel-out -name "Telegram.ipa" -type f -exec cp {} dist/GhostGram.ipa \; 2>/dev/null || true
          ls -lh dist/

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GhostGram-Build-${{ github.run_number }}
          path: dist/*.ipa
          retention-days: 7
